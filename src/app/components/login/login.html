
<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h1>FSW Customer Portal</h1>
      <p>Sign in to submit and view your support tickets</p>
    </div>

    <form (ngSubmit)="onLogin()">

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="userName" [(ngModel)]="userName" placeholder="Enter username" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="password" placeholder="Enter password" required />
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" class="login-btn" [disabled]="isLoading">
        {{ isLoading ? 'Logging in...' : 'Log In' }}
      </button>

      <p class="register-link">
        Don't have an account? <a routerLink="/register">Create one</a>
      </p>

    </form>

  </div>
</div>
