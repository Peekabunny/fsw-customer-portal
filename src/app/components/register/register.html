<div class="register-container">
  <div class="register-card">

    <div class="register-header">
      <h1>FSW Customer Portal</h1>
      <p>Create your account</p>
    </div>

    <form (ngSubmit)="onRegister()">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" [(ngModel)]="name" placeholder="Your full name" required />
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="userName" [(ngModel)]="userName" placeholder="Choose a username" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="email" placeholder="you@email.com" required />
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" [(ngModel)]="phone" placeholder="555-1234" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="password" placeholder="Create a password" required />
      </div>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="success" *ngIf="successMessage">{{ successMessage }}</div>

      <button type="submit" class="register-btn" [disabled]="isLoading">
        {{ isLoading ? 'Creating account...' : 'Create Account' }}
      </button>

      <p class="login-link">
        Already have an account? <a routerLink="/login">Log in</a>
      </p>

    </form>

  </div>
</div>
